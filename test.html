<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 20px;
        }

        .button-container {
            display: flex;
            gap: 15px;
        }

        button {
            background-color: #ff385c;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #e0314d;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div style="text-align: center">
    <h1 id="title">Compteur 1 : 0</h1>
    <div class="button-container">
        <button id="increment-button">Incrémenter</button>
        <button id="decrement-button">Décrémenter</button>
        <button id="reset-button">Réinitialiser</button>
    </div>
</div>

<div style="text-align: center; margin-top: 50px;">
    <h1 id="title">Compteur 2 : 0</h1>
    <div class="button-container">
        <button id="increment-button">Incrémenter</button>
        <button id="decrement-button">Décrémenter</button>
        <button id="reset-button">Réinitialiser</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
